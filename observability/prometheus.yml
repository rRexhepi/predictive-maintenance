global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # FastAPI /metrics is a long-lived target, so scrape it directly by
  # compose service name. No Pushgateway needed.
  - job_name: pm_api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
