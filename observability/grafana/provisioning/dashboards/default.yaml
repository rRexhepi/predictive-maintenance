apiVersion: 1

providers:
  - name: "Predictive Maintenance dashboards"
    orgId: 1
    folder: "Predictive Maintenance"
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
