name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Pytest
        # ``-ra`` prints one-line summaries for anything that isn't PASS so
        # flaky skips/xfails are visible in the job log.
        run: pytest -ra

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          # Use the GHA layer cache so repeat builds on the same PR are
          # near-instant instead of re-installing pip from scratch.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: predictive-maintenance-api:ci
