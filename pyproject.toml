[tool.pytest.ini_options]
# Put the repo root on sys.path so ``from src.api...`` imports resolve
# without turning ``src`` into a real package.
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-ra --strict-markers"

[tool.ruff]
line-length = 100
target-version = "py311"
# Legacy preprocessing + training scripts inherit lint debt from before
# the cleanup arc started. Later PRs rewrite these; until those land,
# exclude them so CI stays green on the incremental stack.
extend-exclude = [
    "src/preprocessing.py",
    "src/train_model.py",
    "notebooks/",
]

[tool.ruff.lint]
# Keep the rule set narrow: pycodestyle errors + pyflakes + import sort.
# The upgrade/bugbear/simplify rule sets catch real issues but would
# require a broader cleanup pass across untouched files before turning
# on. Tighten later in a dedicated PR.
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
]
ignore = [
    "E501",  # line length — formatter handles this
]
