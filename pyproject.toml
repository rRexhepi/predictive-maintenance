[tool.pytest.ini_options]
# Put the repo root on sys.path so ``from src.api...`` imports resolve
# without turning ``src`` into a real package.
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-ra --strict-markers"

[tool.ruff]
line-length = 100
target-version = "py311"
# `train_model.py` is a one-off training entry point slated for rewrite
# once the training pipeline is containerised. Keep it excluded until
# then so CI stays green on the incremental stack.
extend-exclude = [
    "src/train_model.py",
    "notebooks/",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade — drop legacy typing / syntax
    "B",   # flake8-bugbear — catch common real bugs
]
ignore = [
    "E501",  # line length — formatter handles this
]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's dependency-injection markers are called at import time by
# design; they return sentinels, not live objects. Mark them immutable
# so B008 doesn't flag `param: T = Security(...)` / `= Depends(...)`.
extend-immutable-calls = [
    "fastapi.Body",
    "fastapi.Cookie",
    "fastapi.Depends",
    "fastapi.Header",
    "fastapi.Path",
    "fastapi.Query",
    "fastapi.Security",
]
